interface:
  display_name: "Browser-use News Extractor"
  short_description: "Extract Reuters China news to JSON and Markdown"
  default_prompt: "Use browser-use in real headed mode to extract Reuters China headline data (title_source, time_text, datetime_iso, url), normalize and dedupe by URL, keep top 10, translate titles to Chinese, then run scripts/postprocess_news.py to export timestamped JSON and Markdown. In Markdown, render 发布时间 as local time in YYYY-MM-DD HH:mm from datetime_iso when available, and do not show a separate ISO line."
